[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --cov=mspy
    --cov-report=term-missing
    --cov-branch
    --timeout=30
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests